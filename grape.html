<html lang="en" style="--bg: #0b0a16; --accent: #7a5cff; --blue: #00bfff; --text: #e6e6ff; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --card-bg: rgba(255,255,255,0.03); --primary: #7a5cff;"><head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary: #6f42c1;
    --primary-hover: #5936a6;
    --accent: #f6c90e;
    --text: #e6e6fa;
    --bg: #1a1030;
    --border: #3b2a65;
    --radius: 12px;
    
    /* Dynamic Theme Variables Defaults */
    --surface: rgba(255,255,255,0.05);
    --card-bg: rgba(255,255,255,0.03);
    --shadow: rgba(0,0,0,0.3);
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 1rem;
    transition: background-color 0.3s, color 0.3s;
  }

  /* Search Bar */
  #searchBar {
    width: 100%;
    max-width: 500px;
    padding: 0.875rem 1rem;
    border: 0;
    border-radius: var(--radius);
    background: var(--surface);
    backdrop-filter: blur(20px);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
    box-shadow: 0 2px 5px var(--shadow);
    border: 1px solid var(--border);
  }
  #searchBar:focus {
    background: #fff;
    color: #000;
    box-shadow: 0 0 0 3px var(--primary), 0 4px 12px var(--shadow);
  }

  /* Grid */
  #container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }

  .zone-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .zone-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 5px 15px var(--shadow);
    border-color: var(--accent);
  }
  .zone-item img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }
  .zone-item button {
    padding: 0.75rem;
    border: none;
    background: transparent;
    color: var(--text);
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }

  /* Fullscreen Overlay */
  #fullscreenOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
    z-index: 2000;
    height: 100vh;
    width: 100vw;
  }
  #fullscreenHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-family: 'Inter', sans-serif;
    border-bottom: 1px solid #333;
  }
  .header-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    margin-left: 0.5rem;
  }
  #zoneFullscreenFrame {
    flex: 1;
    width: 100%;
    border: none;
  }

  /* --- NEW THEME PANEL STYLES --- */
  #themeFab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    border: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    z-index: 1000;
    transition: transform 0.2s;
  }
  #themeFab:hover {
    transform: scale(1.1);
  }
  #themePanel {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    display: none; /* Hidden by default */
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    z-index: 1000;
    width: 150px;
  }
  #themePanel.visible {
    display: flex;
  }
  .theme-option {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  .theme-option:hover {
    background: var(--primary);
    color: #fff;
  }
</style>
</head>

<div id="fullscreenOverlay" style="display: none;">
  <div id="fullscreenHeader">
    <h2 id="gameTitle" style="margin:0; font-size:1.2rem;">Burrito Bison: Launcha Libre</h2>
    <div>
      <button id="fullscreenBtn" class="header-btn" title="Fullscreen"><i class="fas fa-expand"></i></button>
      <button id="closeFullscreen" class="header-btn" title="Close"><i class="fas fa-times"></i></button>
    </div>
  </div>
  <iframe id="zoneFullscreenFrame" src=""></iframe>
</div>

<button id="themeFab" title="Change Theme"><i class="fas fa-palette"></i></button>
<div id="themePanel">
  <button class="theme-option">Default</button><button class="theme-option">Cyber</button><button class="theme-option">Sunset</button><button class="theme-option">Neon</button><button class="theme-option">Darkred</button><button class="theme-option">Dnv2</button><button class="theme-option">Matrix</button></div>

<script>
/* --- GAME LOADING LOGIC --- */
const container = document.getElementById('container');
const searchBar = document.getElementById('searchBar');
const overlay = document.getElementById('fullscreenOverlay');
const iframe = document.getElementById('zoneFullscreenFrame');
const gameTitle = document.getElementById('gameTitle');

const zonesURLs = ["https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json"];
const coverURL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";

let zones = [];
let zonesURL = zonesURLs[Math.floor(Math.random() * zonesURLs.length)];

async function loadZones() {
  try {
    const response = await fetch(zonesURL);
    zones = await response.json();
    zones = zones.filter(zone => zone.id >= 0 && zone.id <= 5000);
    displayZones();
  } catch (e) {
    container.innerHTML = 'Failed to load zones.';
  }
}

function displayZones(list = zones) {
  container.innerHTML = '';
  list.forEach(zone => {
    const item = document.createElement('div');
    item.className = 'zone-item';
    
    const img = document.createElement('img');
    img.dataset.src = zone.cover.replace('{COVER_URL}', coverURL).replace('{HTML_URL}', htmlURL);
    img.alt = zone.name;
    img.loading = 'lazy';

    const btn = document.createElement('button');
    btn.textContent = zone.name;
    btn.onclick = (e) => { e.stopPropagation(); openZone(zone); };
    item.onclick = () => openZone(zone);
    
    item.appendChild(img);
    item.appendChild(btn);
    container.appendChild(item);
  });
  
  // Lazy Loading
  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.src = e.target.dataset.src;
        obs.unobserve(e.target);
      }
    });
  });
  document.querySelectorAll('img[data-src]').forEach(i => observer.observe(i));
}

function filterZones() {
  const query = searchBar.value.toLowerCase();
  displayZones(zones.filter(z => z.name.toLowerCase().includes(query)));
}

async function openZone(zone) {
  overlay.style.display = 'flex';
  gameTitle.textContent = zone.name;
  
  const zoneUrl = zone.url;
  if (!zoneUrl) return alert('Url missing');
  
  if (zoneUrl.startsWith('http')) {
    iframe.src = zoneUrl;
  } else {
    const fullUrl = zoneUrl.replace('{COVER_URL}', coverURL).replace('{HTML_URL}', htmlURL);
    try {
      const resp = await fetch(fullUrl);
      const html = await resp.text();
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      iframe.src = url;
    } catch (e) {
      iframe.src = fullUrl;
    }
  }
}

document.getElementById('closeFullscreen').onclick = () => { overlay.style.display = 'none'; iframe.src = ''; };
document.getElementById('fullscreenBtn').onclick = () => iframe.requestFullscreen().catch(console.error);
loadZones();

/* --- THEME LOGIC --- */
const root = document.documentElement;
const themePanel = document.getElementById('themePanel');
const themeFab = document.getElementById('themeFab');

const themes = {
  default:{"--bg":"#0b0a16","--accent":"#7a5cff","--blue":"#00bfff","--text":"#e6e6ff","--surface":"rgba(255,255,255,0.05)","--border":"rgba(255,255,255,0.1)","--card-bg":"rgba(255,255,255,0.03)","--primary":"#7a5cff"},
  cyber:{"--bg":"#050c1b","--accent":"#39ff14","--blue":"#00ffff","--text":"#e0ffe0","--surface":"rgba(0,255,0,0.05)","--border":"rgba(0,255,0,0.1)","--card-bg":"rgba(0,255,0,0.03)","--primary":"#39ff14"},
  sunset:{"--bg":"#1a0b0b","--accent":"#ff6f61","--blue":"#ffa500","--text":"#fff0e6","--surface":"rgba(255,110,100,0.05)","--border":"rgba(255,110,100,0.1)","--card-bg":"rgba(255,110,100,0.03)","--primary":"#ff6f61"},
  neon:{"--bg":"#0f0020","--accent":"#ff00ff","--blue":"#00ffff","--text":"#ffffff","--surface":"rgba(255,0,255,0.05)","--border":"rgba(255,0,255,0.1)","--card-bg":"rgba(255,0,255,0.03)","--primary":"#ff00ff"},
  darkred:{"--bg":"#1b0000","--accent":"#ff0000","--blue":"#cc0000","--text":"#ffe6e6","--surface":"rgba(255,0,0,0.05)","--border":"rgba(255,0,0,0.1)","--card-bg":"rgba(255,0,0,0.03)","--primary":"#ff0000"},
  dnv2:{"--bg": "#050007","--accent": "#ff00de","--blue": "#00fff7","--text": "#ffffff","--surface": "rgba(255, 0, 255, 0.05)","--border": "rgba(255, 0, 255, 0.15)","--card-bg": "rgba(15, 0, 30, 0.7)","--primary":"#ff00de"},
  matrix: {"--bg": "#001100","--accent": "#00ff00","--blue": "#33ff33","--text": "#99ff99","--surface": "rgba(0, 255, 0, 0.05)","--border": "rgba(0, 255, 0, 0.15)","--card-bg": "rgba(0, 50, 0, 0.7)","--primary":"#00ff00"}
};

// Toggle Panel
themeFab.onclick = () => {
  themePanel.classList.toggle('visible');
};

// Apply Theme Function
function applyTheme(name) {
  const theme = themes[name];
  if(!theme) return;
  Object.entries(theme).forEach(([k,v])=>root.style.setProperty(k,v));
  // Save preference to localStorage (will persist if user refreshes the about:blank tab)
  localStorage.setItem("dominum-theme", name);
}

// Generate Buttons
Object.keys(themes).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'theme-option';
  btn.textContent = name.charAt(0).toUpperCase() + name.slice(1); // Capitalize
  btn.onclick = () => {
    applyTheme(name);
    themePanel.classList.remove('visible');
  };
  themePanel.appendChild(btn);
});

// Load Saved Theme
(function(){
  const saved = localStorage.getItem("dominum-theme") || "default";
  applyTheme(saved);
})();
</script>
